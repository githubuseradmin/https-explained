name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Parse-check the scripts
        run: |
          node --check steps.js
          node --check app.js
          node --check steps.test.js

      - name: Run tests
        run: node --test
